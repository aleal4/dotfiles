"$schema" = 'https://starship.rs/config-schema.json'

format = "$username$hostname$directory$git_branch$git_status$cmd_duration $character"

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = '#f5e0dc'
flamingo  = '#f2cdcd'
pink      = '#f5c2e7'
mauve     = '#cba6f7'
red       = '#f38ba8'
maroon    = '#eba0ac'
peach     = '#fab387'
yellow    = '#f9e2af'
green     = '#a6e3a1'
teal      = '#94e2d5'
sky       = '#89dceb'
sapphire  = '#74c7ec'
blue      = '#89b4fa'
lavender  = '#b4befe'
text      = '#cdd6f4'
subtext1  = '#bac2de'
subtext0  = '#a6adc8'
overlay2  = '#9399b2'
overlay1  = '#7f849c'
overlay0  = '#6c7086'
surface2  = '#585b70'
surface1  = '#45475a'
surface0  = '#313244'
base      = '#1e1e2e'
mantle    = '#181825'
crust     = '#11111b'

[username]
style_user = 'bold mauve'
style_root = 'bold red'
format = '[$user]($style) '
show_always = true

# Changed from work machine (was disabled = true):
# hidden locally, appears the moment you SSH into any lab machine
[hostname]
disabled = false
ssh_only = true
style = 'bold yellow'
format = '[@$hostname]($style) '

[directory]
style = 'bold blue'
format = '[$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = true

[git_branch]
style = 'bold mauve'
format = '[$symbol$branch]($style) '

[git_status]
style = 'bold red'
format = '([\[$all_status$ahead_behind\]]($style) )'

[nodejs]
style = 'bold green'
format = '[$symbol($version )]($style)'

[python]
style = 'bold yellow'
format = '[$symbol($version )]($style)'

[rust]
style = 'bold red'
format = '[$symbol($version )]($style)'

[cmd_duration]
min_time = 2000
style = 'bold overlay0'
format = 'took [$duration]($style) '

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'
